<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mensal - Placements ADQ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0f1a;color:#e8eaf0;font-family:Segoe UI,system-ui,sans-serif;font-size:13px;padding:24px 20px;}
h1{font-size:18px;font-weight:700;color:#f5c518;margin-bottom:2px;}
.subtitle{font-size:12px;color:#6b7280;margin-bottom:20px;}
.updated{font-size:11px;color:#374151;margin-bottom:20px;}

/* Month pills */
.section-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.pill{padding:4px 12px;border-radius:20px;border:1px solid #1e2235;background:#141728;color:#9ca3af;cursor:pointer;font-size:11px;transition:all .15s;}
.pill.active{background:#f5c518;color:#0d0f1a;border-color:#f5c518;font-weight:700;}
.pill:hover:not(.active){border-color:#f5c518;color:#f5c518;}
.pill.plpill.active{background:#00c6ff;color:#0d0f1a;border-color:#00c6ff;}
.pill.plpill:hover:not(.active){border-color:#00c6ff;color:#00c6ff;}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi-card{background:#141728;border:1px solid #1e2235;border-radius:10px;padding:14px 16px;}
.kpi-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.kpi-value{font-size:22px;font-weight:700;color:#f5c518;}
.kpi-sub{font-size:11px;color:#9ca3af;margin-top:2px;}
.kpi-pos{color:#22c55e;}
.kpi-neg{color:#ef4444;}

/* Cards */
.card{background:#141728;border:1px solid #1e2235;border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;color:#e8eaf0;}

/* Rank table */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;padding:6px 8px;border-bottom:1px solid #1e2235;}
td{padding:7px 8px;border-bottom:1px solid #1a1f33;font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.rank-num{font-size:11px;color:#6b7280;width:28px;}
.rank-name{color:#e8eaf0;}
.rank-val{text-align:right;font-weight:600;color:#f5c518;}
.rank-mom{text-align:right;font-size:11px;width:60px;}
.bar-cell{width:120px;}
.mini-bar-bg{background:#1a1f33;border-radius:4px;height:6px;overflow:hidden;}
.mini-bar{background:#f5c518;height:6px;border-radius:4px;}
.change-pos{color:#22c55e;}
.change-neg{color:#ef4444;}
.change-neu{color:#6b7280;}

/* Chart canvas */
.chart-wrap{position:relative;width:100%;height:280px;}
canvas{display:block;}

/* Stacked bar chart */
.stacked-wrap{overflow-x:auto;}
.stacked-chart{display:flex;flex-direction:column;gap:8px;min-width:500px;}
.stacked-row{display:flex;align-items:center;gap:8px;}
.stacked-label{font-size:11px;color:#9ca3af;width:52px;flex-shrink:0;text-align:right;}
.stacked-bar-wrap{flex:1;height:26px;display:flex;border-radius:5px;overflow:hidden;}
.stacked-seg{height:100%;transition:width .3s;}
.stacked-total{font-size:11px;color:#6b7280;width:54px;flex-shrink:0;text-align:right;}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#9ca3af;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Horizontal bar for selected month */
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.hbar-name{font-size:11px;color:#9ca3af;width:180px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hbar-bg{flex:1;background:#1a1f33;border-radius:4px;height:18px;overflow:hidden;}
.hbar-fill{height:18px;border-radius:4px;background:#f5c518;transition:width .3s;}
.hbar-val{font-size:11px;font-weight:600;color:#f5c518;width:60px;text-align:right;flex-shrink:0;}
</style>
</head>
<body>

<h1>Dashboard Mensal - Placements ADQ</h1>
<p class="subtitle">Usuarios convertidos por placement, ultimos 14 meses</p>
<p class="updated" id="updatedAt"></p>

<!-- Month pills -->
<div class="section-label">Mes de referencia</div>
<div class="pills" id="monthPills"></div>

<!-- KPIs -->
<div class="kpi-grid" id="kpiGrid"></div>

<!-- Row: rank table + horizontal bar -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
  <div class="card">
    <div class="card-header"><span class="card-title">Ranking do Mes</span></div>
    <table id="rankTable"></table>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Volume por Placement</span></div>
    <div id="hbarChart"></div>
  </div>
</div>

<!-- Line chart -->
<div class="card">
  <div class="card-header">
    <span class="card-title">Evolucao Mensal</span>
    <div class="pills" id="plPills" style="margin:0;gap:5px;"></div>
  </div>
  <div class="chart-wrap" id="lineWrap"><canvas id="lineChart"></canvas></div>
  <div class="legend" id="lineLegend"></div>
</div>

<!-- Stacked bar -->
<div class="card">
  <div class="card-header"><span class="card-title">Composicao por Mes (todos os placements)</span></div>
  <div class="stacked-wrap">
    <div class="stacked-chart" id="stackedChart"></div>
  </div>
  <div class="legend" id="stackedLegend"></div>
</div>
