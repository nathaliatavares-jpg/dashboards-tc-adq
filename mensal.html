<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mensal - Placements ADQ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0f1a;color:#e8eaf0;font-family:Segoe UI,system-ui,sans-serif;font-size:13px;padding:24px 20px;}
h1{font-size:18px;font-weight:700;color:#f5c518;margin-bottom:2px;}
.subtitle{font-size:12px;color:#6b7280;margin-bottom:20px;}
.updated{font-size:11px;color:#374151;margin-bottom:20px;}

/* Month pills */
.section-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.pill{padding:4px 12px;border-radius:20px;border:1px solid #1e2235;background:#141728;color:#9ca3af;cursor:pointer;font-size:11px;transition:all .15s;}
.pill.active{background:#f5c518;color:#0d0f1a;border-color:#f5c518;font-weight:700;}
.pill:hover:not(.active){border-color:#f5c518;color:#f5c518;}
.pill.plpill.active{background:#00c6ff;color:#0d0f1a;border-color:#00c6ff;}
.pill.plpill:hover:not(.active){border-color:#00c6ff;color:#00c6ff;}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi-card{background:#141728;border:1px solid #1e2235;border-radius:10px;padding:14px 16px;}
.kpi-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.kpi-value{font-size:22px;font-weight:700;color:#f5c518;}
.kpi-sub{font-size:11px;color:#9ca3af;margin-top:2px;}
.kpi-pos{color:#22c55e;}
.kpi-neg{color:#ef4444;}

/* Cards */
.card{background:#141728;border:1px solid #1e2235;border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;color:#e8eaf0;}

/* Rank table */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;padding:6px 8px;border-bottom:1px solid #1e2235;}
td{padding:7px 8px;border-bottom:1px solid #1a1f33;font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.rank-num{font-size:11px;color:#6b7280;width:28px;}
.rank-name{color:#e8eaf0;}
.rank-val{text-align:right;font-weight:600;color:#f5c518;}
.rank-mom{text-align:right;font-size:11px;width:60px;}
.bar-cell{width:120px;}
.mini-bar-bg{background:#1a1f33;border-radius:4px;height:6px;overflow:hidden;}
.mini-bar{background:#f5c518;height:6px;border-radius:4px;}
.change-pos{color:#22c55e;}
.change-neg{color:#ef4444;}
.change-neu{color:#6b7280;}

/* Chart canvas */
.chart-wrap{position:relative;width:100%;height:280px;}
canvas{display:block;}

/* Stacked bar chart */
.stacked-wrap{overflow-x:auto;}
.stacked-chart{display:flex;flex-direction:column;gap:8px;min-width:500px;}
.stacked-row{display:flex;align-items:center;gap:8px;}
.stacked-label{font-size:11px;color:#9ca3af;width:52px;flex-shrink:0;text-align:right;}
.stacked-bar-wrap{flex:1;height:26px;display:flex;border-radius:5px;overflow:hidden;}
.stacked-seg{height:100%;transition:width .3s;}
.stacked-total{font-size:11px;color:#6b7280;width:54px;flex-shrink:0;text-align:right;}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#9ca3af;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Horizontal bar for selected month */
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.hbar-name{font-size:11px;color:#9ca3af;width:180px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hbar-bg{flex:1;background:#1a1f33;border-radius:4px;height:18px;overflow:hidden;}
.hbar-fill{height:18px;border-radius:4px;background:#f5c518;transition:width .3s;}
.hbar-val{font-size:11px;font-weight:600;color:#f5c518;width:60px;text-align:right;flex-shrink:0;}
</style>
</head>
<body>

<h1>Dashboard Mensal - Placements ADQ</h1>
<p class="subtitle">Usuarios convertidos por placement, ultimos 14 meses</p>
<p class="updated" id="updatedAt"></p>

<!-- Month pills -->
<div class="section-label">Mes de referencia</div>
<div class="pills" id="monthPills"></div>

<!-- KPIs -->
<div class="kpi-grid" id="kpiGrid"></div>

<!-- Row: rank table + horizontal bar -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
  <div class="card">
    <div class="card-header"><span class="card-title">Ranking do Mes</span></div>
    <table id="rankTable"></table>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Volume por Placement</span></div>
    <div id="hbarChart"></div>
  </div>
</div>

<!-- Line chart -->
<div class="card">
  <div class="card-header">
    <span class="card-title">Evolucao Mensal</span>
    <div class="pills" id="plPills" style="margin:0;gap:5px;"></div>
  </div>
  <div class="chart-wrap" id="lineWrap"><canvas id="lineChart"></canvas></div>
  <div class="legend" id="lineLegend"></div>
</div>

<!-- Stacked bar -->
<div class="card">
  <div class="card-header"><span class="card-title">Composicao por Mes (todos os placements)</span></div>
  <div class="stacked-wrap">
    <div class="stacked-chart" id="stackedChart"></div>
  </div>
  <div class="legend" id="stackedLegend"></div>
</div>

<script>
// ===== DATA =====
</script>

<script>
// ===== COLORS =====
var COLORS = [
  '#f5c518','#00c6ff','#22c55e','#e879f9','#f97316',
  '#38bdf8','#a3e635','#fb7185','#c084fc','#34d399','#facc15'
];

// ===== STATE =====
var curMes = null;
var activePlacements = new Set();

// ===== HELPERS =====
function fmtMes(m) {
  var y = m.substring(0,4), mo = m.substring(4,6);
  var names = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return names[parseInt(mo)-1] + ' ' + y;
}
function fmtNum(n) {
  if (n === null || n === undefined) return '-';
  return Math.round(n).toLocaleString('pt-BR');
}
function pctChange(a, b) {
  if (!b || b === 0) return null;
  return (a - b) / b * 100;
}

// ===== INIT =====
function init() {
  if (typeof UPDATED !== 'undefined') {
    document.getElementById('updatedAt').textContent = 'Atualizado em: ' + UPDATED;
  }

  if (typeof MESES === 'undefined') {
    document.body.innerHTML += '<p style="color:#ef4444;padding:40px;text-align:center">Dados nao carregados. Execute update_mensal.ps1 para atualizar.</p>';
    return;
  }

  // Set all placements active
  PLS.forEach(function(pl) { activePlacements.add(pl); });

  // Default: last month
  curMes = MESES[MESES.length - 1];

  buildMonthPills();
  buildPlPills();
  render();
}

function buildMonthPills() {
  var container = document.getElementById('monthPills');
  container.innerHTML = '';
  MESES.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'pill' + (m === curMes ? ' active' : '');
    btn.textContent = fmtMes(m);
    btn.onclick = function() { curMes = m; buildMonthPills(); renderMonth(); };
    container.appendChild(btn);
  });
}

function buildPlPills() {
  var container = document.getElementById('plPills');
  container.innerHTML = '';

  var allBtn = document.createElement('button');
  allBtn.className = 'pill plpill' + (activePlacements.size === PLS.length ? ' active' : '');
  allBtn.textContent = 'Todos';
  allBtn.onclick = function() {
    if (activePlacements.size === PLS.length) {
      // keep at least one
    } else {
      PLS.forEach(function(p){ activePlacements.add(p); });
      buildPlPills(); renderLine();
    }
  };
  container.appendChild(allBtn);

  PLS.forEach(function(pl, i) {
    var btn = document.createElement('button');
    btn.className = 'pill plpill' + (activePlacements.has(pl) ? ' active' : '');
    btn.textContent = pl;
    btn.style.cssText = activePlacements.has(pl) ? 'background:' + COLORS[i % COLORS.length] + ';color:#0d0f1a;border-color:' + COLORS[i % COLORS.length] + ';' : '';
    btn.onclick = function() {
      if (activePlacements.has(pl)) {
        if (activePlacements.size > 1) activePlacements.delete(pl);
      } else {
        activePlacements.add(pl);
      }
      buildPlPills(); renderLine();
    };
    container.appendChild(btn);
  });
}

function render() {
  renderMonth();
  renderLine();
  renderStacked();
}

// ===== MONTH RENDERING =====
function getMonthIdx(m) { return MESES.indexOf(m); }

function getPlVal(pl, mesIdx) {
  if (!DATA[pl] || mesIdx < 0) return 0;
  return DATA[pl][mesIdx] || 0;
}

function renderMonth() {
  var idx = getMonthIdx(curMes);
  var prevIdx = idx - 1;

  // Build sorted list for this month
  var items = PLS.map(function(pl, i) {
    var val = getPlVal(pl, idx);
    var prev = prevIdx >= 0 ? getPlVal(pl, prevIdx) : null;
    return { pl: pl, val: val, prev: prev, i: i };
  }).sort(function(a, b) { return b.val - a.val; });

  var totalThisMes = TOTAL[idx] || 0;
  var totalPrevMes = prevIdx >= 0 ? (TOTAL[prevIdx] || 0) : null;

  // KPIs
  var topPl = items[0];
  var bestMom = null, bestMomPct = -Infinity;
  items.forEach(function(it) {
    if (it.prev !== null && it.prev > 0) {
      var p = pctChange(it.val, it.prev);
      if (p > bestMomPct) { bestMomPct = p; bestMom = it; }
    }
  });
  var activePls = items.filter(function(it){ return it.val > 0; }).length;

  var momTotal = totalPrevMes !== null ? pctChange(totalThisMes, totalPrevMes) : null;

  var kpiGrid = document.getElementById('kpiGrid');
  kpiGrid.innerHTML = kpiCard('Total de Usuarios', fmtNum(totalThisMes), momTotal !== null ? (momTotal >= 0 ? '+' : '') + momTotal.toFixed(1) + '% vs mes anterior' : '', momTotal) +
    kpiCard('Top Placement', topPl ? topPl.pl : '-', topPl ? fmtNum(topPl.val) + ' usuarios' : '', null) +
    kpiCard('Maior Crescimento MoM', bestMom ? (bestMomPct >= 0 ? '+' : '') + bestMomPct.toFixed(1) + '%' : '-', bestMom ? bestMom.pl : '', bestMom ? bestMomPct : null) +
    kpiCard('Placements Ativos', activePls, 'de ' + PLS.length + ' totais', null);
  kpiGrid.querySelectorAll('.kpi-value')[2] && (kpiGrid.querySelectorAll('.kpi-value')[2].className = 'kpi-value' + (bestMomPct >= 0 ? ' kpi-pos' : ' kpi-neg'));

  // Rank table
  var maxVal = items[0] ? items[0].val : 1;
  var tbody = '';
  items.forEach(function(it, rank) {
    var mom = (it.prev !== null && it.prev > 0) ? pctChange(it.val, it.prev) : null;
    var momStr = mom !== null ? (mom >= 0 ? '+' : '') + mom.toFixed(1) + '%' : '-';
    var momClass = mom === null ? 'change-neu' : (mom > 0 ? 'change-pos' : (mom < 0 ? 'change-neg' : 'change-neu'));
    var barPct = maxVal > 0 ? (it.val / maxVal * 100) : 0;
    tbody += '<tr><td class="rank-num">' + (rank+1) + '</td>' +
      '<td class="rank-name">' + it.pl + '</td>' +
      '<td class="bar-cell"><div class="mini-bar-bg"><div class="mini-bar" style="width:' + barPct.toFixed(1) + '%;background:' + COLORS[it.i % COLORS.length] + '"></div></div></td>' +
      '<td class="rank-val">' + fmtNum(it.val) + '</td>' +
      '<td class="rank-mom ' + momClass + '">' + momStr + '</td></tr>';
  });
  document.getElementById('rankTable').innerHTML =
    '<thead><tr><th></th><th>Placement</th><th class="bar-cell"></th><th style="text-align:right">Usuarios</th><th style="text-align:right">MoM</th></tr></thead><tbody>' + tbody + '</tbody>';

  // Horizontal bar
  var hbar = document.getElementById('hbarChart');
  var maxH = items[0] ? items[0].val : 1;
  hbar.innerHTML = items.map(function(it) {
    var pct = maxH > 0 ? (it.val / maxH * 100) : 0;
    return '<div class="hbar-row">' +
      '<div class="hbar-name" title="' + it.pl + '">' + it.pl + '</div>' +
      '<div class="hbar-bg"><div class="hbar-fill" style="width:' + pct.toFixed(1) + '%;background:' + COLORS[it.i % COLORS.length] + '"></div></div>' +
      '<div class="hbar-val">' + fmtNum(it.val) + '</div></div>';
  }).join('');
}

function kpiCard(label, value, sub, change) {
  var valClass = 'kpi-value';
  if (change !== null && change !== undefined) {
    valClass += change > 0 ? ' kpi-pos' : (change < 0 ? ' kpi-neg' : '');
  }
  return '<div class="kpi-card"><div class="kpi-label">' + label + '</div><div class="' + valClass + '">' + value + '</div><div class="kpi-sub">' + sub + '</div></div>';
}

// ===== LINE CHART =====
function renderLine() {
  buildPlPills();
  var canvas = document.getElementById('lineChart');
  var wrap = document.getElementById('lineWrap');
  canvas.width = wrap.clientWidth || 700;
  canvas.height = 280;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  var W = canvas.width, H = canvas.height;
  var pad = { top: 20, right: 20, bottom: 40, left: 70 };
  var cW = W - pad.left - pad.right;
  var cH = H - pad.top - pad.bottom;

  var activePls = PLS.filter(function(p){ return activePlacements.has(p); });
  if (activePls.length === 0 || typeof MESES === 'undefined') return;

  // Find max
  var maxVal = 0;
  activePls.forEach(function(pl) {
    (DATA[pl] || []).forEach(function(v) { if (v > maxVal) maxVal = v; });
  });
  if (maxVal === 0) maxVal = 1;

  var n = MESES.length;
  var xStep = cW / (n - 1 || 1);

  // Grid
  ctx.strokeStyle = '#1e2235';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var gy = pad.top + cH - (g / 4 * cH);
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(pad.left + cW, gy); ctx.stroke();
    ctx.fillStyle = '#6b7280';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'right';
    ctx.fillText(fmtNum(maxVal * g / 4), pad.left - 6, gy + 3);
  }

  // X labels
  ctx.fillStyle = '#6b7280';
  ctx.font = '10px Segoe UI';
  ctx.textAlign = 'center';
  MESES.forEach(function(m, i) {
    if (n > 12 && i % 2 !== 0) return;
    var x = pad.left + i * xStep;
    var mo = m.substring(4,6);
    var names = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    var label = names[parseInt(mo)-1];
    if (mo === '01') label = m.substring(0,4);
    ctx.fillText(label, x, H - 10);
  });

  // Lines
  activePls.forEach(function(pl) {
    var data = DATA[pl] || [];
    var color = COLORS[PLS.indexOf(pl) % COLORS.length];
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    var started = false;
    data.forEach(function(v, i) {
      if (v === null || v === undefined) { started = false; return; }
      var x = pad.left + i * xStep;
      var y = pad.top + cH - (v / maxVal * cH);
      if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
    });
    ctx.stroke();

    // Dots
    data.forEach(function(v, i) {
      if (v === null || v === undefined) return;
      var x = pad.left + i * xStep;
      var y = pad.top + cH - (v / maxVal * cH);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fill();
    });
  });

  // Legend
  var legend = document.getElementById('lineLegend');
  legend.innerHTML = activePls.map(function(pl) {
    var color = COLORS[PLS.indexOf(pl) % COLORS.length];
    return '<div class="legend-item"><div class="legend-dot" style="background:' + color + '"></div>' + pl + '</div>';
  }).join('');
}

// ===== STACKED BAR =====
function renderStacked() {
  var container = document.getElementById('stackedChart');
  container.innerHTML = '';

  var maxTotal = Math.max.apply(null, TOTAL.map(function(v){ return v || 0; }));
  if (maxTotal === 0) maxTotal = 1;

  // Newest first
  var orderedMeses = MESES.slice().reverse();

  orderedMeses.forEach(function(m) {
    var idx = getMonthIdx(m);
    var total = TOTAL[idx] || 0;
    var row = document.createElement('div');
    row.className = 'stacked-row';

    var mo = m.substring(4,6);
    var names = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    var label = names[parseInt(mo)-1] + '<br><span style="font-size:9px;color:#374151">' + m.substring(0,4) + '</span>';

    var barWrap = document.createElement('div');
    barWrap.className = 'stacked-bar-wrap';
    barWrap.style.width = (total / maxTotal * 100).toFixed(1) + '%';

    PLS.forEach(function(pl, i) {
      var v = getPlVal(pl, idx);
      if (v <= 0 || total <= 0) return;
      var seg = document.createElement('div');
      seg.className = 'stacked-seg';
      seg.style.width = (v / total * 100).toFixed(2) + '%';
      seg.style.background = COLORS[i % COLORS.length];
      seg.title = pl + ': ' + fmtNum(v);
      barWrap.appendChild(seg);
    });

    row.innerHTML = '<div class="stacked-label">' + label + '</div>';
    row.appendChild(barWrap);

    var totEl = document.createElement('div');
    totEl.className = 'stacked-total';
    totEl.textContent = total >= 1000 ? (total/1000).toFixed(1) + 'k' : fmtNum(total);
    row.appendChild(totEl);

    container.appendChild(row);
  });

  // Legend
  var legend = document.getElementById('stackedLegend');
  legend.innerHTML = PLS.map(function(pl, i) {
    return '<div class="legend-item"><div class="legend-dot" style="background:' + COLORS[i % COLORS.length] + '"></div>' + pl + '</div>';
  }).join('');
}

// ===== RESIZE =====
window.addEventListener('resize', function() { renderLine(); });

// ===== START =====
init();
</script>
</body>
</html>
